name = "xupastack-selfhost-REPLACE_SLUG"
main = "src/index.ts"
compatibility_date = "2024-05-24"
compatibility_flags = ["nodejs_compat"]

# Customise the worker name and route to match your domain:
#   wrangler route create "your-gateway-domain.com/*" --zone-name your-domain.com

[[kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_WITH_YOUR_KV_ID"
# Config is stored in KV key "gateway:config" (JSON, GatewayConfig schema)

# Secrets (set via: wrangler secret put <NAME>):
#   ADMIN_TOKEN  – generated by create-xupastack CLI, stored in ~/.xupastack/<slug>/admin-token.txt

[vars]
ENVIRONMENT = "production"
