version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      hono:
        patterns:
          - "hono"
      drizzle:
        patterns:
          - "drizzle-*"
      zod:
        patterns:
          - "zod"
